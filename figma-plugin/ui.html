<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Markdown to Figma</title>
    <style>
      /* FX UI Kit (SAP Horizon) tokens — pulled from the source design.
         Family "72" is SAP's brand face; we fall back to system UI when it
         isn't installed (the Figma plugin runtime has no access to the SAP CDN). */
      :root {
        --surface-secondary: #f8f9fa;
        --surface-primary: #fdfeff;
        --border-active: #7c879c;
        --border-focus: #0070f2;
        --text-primary: #0b0c0f;
        --text-tertiary: #636d83;
        --accent: #0070f2;
        --accent-hover: #0064d9;
        --accent-active: #0058bf;
        --negative: #c72f2b;

        --radius-m: 8px;
        --radius-s: 4px;

        --spacing-4xs: 2px;
        --spacing-2xs: 8px;
        --spacing-l: 16px;
        --spacing-2xl: 28px;
        --spacing-3xl: 30px;

        --font-family: "72", "72override", -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --font-family-mono: "72-Mono", "72Mono", ui-monospace, SFMono-Regular,
          "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New",
          monospace;
      }

      * { box-sizing: border-box; }

      html, body { height: 100%; }

      body {
        margin: 0;
        font-family: var(--font-family);
        font-size: 14px;
        color: var(--text-primary);
        background: var(--surface-secondary);
        -webkit-font-smoothing: antialiased;
      }

      .plugin {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-l);
        height: 100%;
        padding: var(--spacing-2xl) var(--spacing-3xl);
      }

      .plugin__title {
        margin: 0;
        font-weight: 400;
        font-size: 40px;
        line-height: 48px;
        color: var(--text-primary);
        letter-spacing: 0;
      }

      /* Field group: Label + TextArea ------------------------------ */
      .field {
        display: flex;
        flex: 1 1 auto;
        flex-direction: column;
        gap: var(--spacing-2xs);
        min-height: 0;
        width: 100%;
      }

      .field__label {
        font-size: 14px;
        line-height: normal;
        color: var(--text-tertiary);
      }

      .field__textarea {
        flex: 1 1 auto;
        width: 100%;
        min-height: 0;
        padding: 10px 14px;
        font-family: var(--font-family-mono);
        font-size: 14px;
        line-height: 20px;
        color: var(--text-primary);
        background: var(--surface-primary);
        border: 1px solid var(--border-active);
        border-radius: var(--radius-m);
        resize: none;
        outline: none;
        transition: border-color 120ms ease, box-shadow 120ms ease;
      }

      .field__textarea::placeholder {
        font-style: italic;
        color: var(--text-tertiary);
      }

      .field__textarea:hover  { border-color: var(--text-tertiary); }
      .field__textarea:focus  {
        border-color: var(--border-focus);
        box-shadow: 0 0 0 1px var(--border-focus);
      }

      /* Buttons ---------------------------------------------------- */
      .actions {
        display: flex;
        gap: var(--spacing-2xs);
        align-items: center;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: var(--spacing-2xs);
        height: 36px;
        padding: 0 16px;
        font-family: var(--font-family);
        font-size: 14px;
        font-weight: 600;
        line-height: 22px;
        border-radius: var(--radius-m);
        border: 1px solid transparent;
        cursor: pointer;
        transition: background-color 120ms ease, border-color 120ms ease,
          color 120ms ease;
      }

      .btn:focus-visible {
        outline: 2px solid var(--border-focus);
        outline-offset: 2px;
      }

      .btn--primary {
        color: #ffffff;
        background: var(--accent);
        border-color: var(--accent);
      }
      .btn--primary:hover  { background: var(--accent-hover);  border-color: var(--accent-hover); }
      .btn--primary:active { background: var(--accent-active); border-color: var(--accent-active); }

      .btn--ghost {
        color: var(--accent);
        background: transparent;
        border-color: transparent;
      }
      .btn--ghost:hover  { background: rgba(0, 112, 242, 0.08); }
      .btn--ghost:active { background: rgba(0, 112, 242, 0.16); }

      .btn--end { margin-left: auto; }

      .btn__icon {
        display: inline-flex;
        width: 16px;
        height: 16px;
        color: currentColor;
      }

      .btn__icon svg {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <main class="plugin">
      <h1 class="plugin__title">Markdown to Figma</h1>

      <div class="field">
        <label class="field__label" for="md">Paste Markdown below:</label>
        <textarea
          id="md"
          class="field__textarea"
          placeholder="Paste Markdown formatted text to convert into Figma auto layout"
        ></textarea>
      </div>

      <div class="actions">
        <button id="render" class="btn btn--primary" type="button">
          <span class="btn__icon" aria-hidden="true">
            <svg viewBox="0 0 18.2861 18.2857" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                fill-rule="evenodd"
                clip-rule="evenodd"
                fill="currentColor"
                d="M6.30286 9.97107C5.93786 11.34 4.68929 12.3482 3.20536 12.3482C1.435 12.3482 0 10.9132 0 9.14286C0 7.3725 1.435 5.9375 3.20536 5.9375C4.70964 5.9375 5.97179 6.97357 6.31714 8.37107H8.63143L8.04786 7.78393C7.73643 7.47036 7.73822 6.96393 8.05143 6.6525C8.365 6.34107 8.87143 6.34286 9.18286 6.65607L11.0568 8.5425C11.0789 8.56072 11.1007 8.58 11.1214 8.60072C11.2879 8.76822 11.365 8.99071 11.3525 9.20929C11.3432 9.40179 11.2646 9.59179 11.1171 9.73822C11.0975 9.75786 11.0768 9.77643 11.0554 9.79357L9.16643 11.6704C8.85286 11.9818 8.34643 11.98 8.035 11.6668C7.72357 11.3532 7.72536 10.8468 8.03857 10.5354L8.60643 9.97107H6.30143H6.30286ZM3.20536 10.5196C3.96571 10.5196 4.58214 9.90322 4.58214 9.14286C4.58214 8.3825 3.96571 7.76607 3.20536 7.76607C2.445 7.76607 1.82857 8.3825 1.82857 9.14286C1.82857 9.90322 2.445 10.5196 3.20536 10.5196ZM11.8286 7.77679C11.8286 6.76679 12.6546 5.94821 13.6736 5.94821H16.4411C17.46 5.94821 18.2861 6.76679 18.2861 7.77679V10.5196C18.2861 11.5296 17.46 12.3482 16.4411 12.3482H13.6736C12.6546 12.3482 11.8286 11.5296 11.8286 10.5196V7.77679ZM16.4407 7.77679H13.6732V10.5196H16.4407V7.77679Z"
              />
            </svg>
          </span>
          <span class="btn__label">Render</span>
        </button>
        <button id="sample" class="btn btn--ghost btn--end" type="button">Load sample</button>
      </div>
    </main>
    <script>
      // UI side: forward raw Markdown to the main thread, which does the
      // parsing and renders Figma nodes.
      (function () {
        var $ = function (id) { return document.getElementById(id); };

        $("render").addEventListener("click", function () {
          var markdown = $("md").value || "";
          parent.postMessage({ pluginMessage: { type: "render-md", markdown: markdown } }, "*");
        });

        $("sample").addEventListener("click", function () {
          $("md").value = [
            "# Sample Title",
            "",
            "A paragraph with **bold**, *italic*,",
            "[link](https://example.com) and `code`.",
            "",
            "---",
            "",
            "> Blockquote here.",
            "",
            "## List",
            "- First item",
            "- Second item",
            "",
            "## Table",
            "| Name | Value |",
            "| --- | --- |",
            "| A | 1 |",
            "| B | 2 |",
            "",
          ].join("\n");
        });
      })();
    </script>
  </body>
</html>
